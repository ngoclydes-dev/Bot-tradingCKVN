name: Quet breakout real-time

# Lich chay duoc dieu khien hoan toan boi cron-job.org (goi workflow_dispatch),
# KHONG dung "schedule" cua GitHub de tranh bi tre gio hoac chay trung 2 nguon.
on:
  workflow_dispatch: {}

# Can quyen ghi de bot tu commit lai file trang thai chong gui canh bao trung
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cai dat thu vien
        run: pip install -r requirements.txt

      - name: Quet breakout va gui canh bao neu co
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python realtime_alert.py

      - name: Luu lai trang thai da canh bao
        run: |
          git config user.name "vn-stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/breakout_state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: cap nhat trang thai breakout [skip ci]"
            git push
          else
            echo "Khong co thay doi trang thai, bo qua commit."
          fi
