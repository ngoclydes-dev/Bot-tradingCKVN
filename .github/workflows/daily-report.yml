name: Bao cao chung khoan dinh ky (8h00 & 15h00)

# Lưu ý: lịch chạy được điều khiển hoàn toàn bởi cron-job.org (gọi workflow_dispatch),
# KHÔNG dùng "schedule" của GitHub để tránh bị trễ giờ hoặc chạy trùng 2 nguồn.
on:
  workflow_dispatch: {}

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cai dat thu vien
        run: pip install -r requirements.txt

      - name: Xac dinh nhan bao cao theo gio Viet Nam
        id: label
        run: |
          HOUR_VN=$(TZ='Asia/Ho_Chi_Minh' date +%H)
          DATE_VN=$(TZ='Asia/Ho_Chi_Minh' date +'%d/%m/%Y')
          if [ "$HOUR_VN" -lt "12" ]; then
            echo "label=Bao cao SANG (08:00) - $DATE_VN" >> "$GITHUB_OUTPUT"
          else
            echo "label=Bao cao CHIEU (15:00) - $DATE_VN" >> "$GITHUB_OUTPUT"
          fi

      - name: Chay bao cao va gui Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --label "${{ steps.label.outputs.label }}"
