name: Quet breakout real-time

# Phiên giao dịch HOSE/HNX (giờ VN): 9h15-11h30 và 13h00-14h45
# Đổi sang UTC (VN = UTC+7): 02:15-04:30 và 06:00-07:45
# Cron dưới đây lấy khung giờ rộng hơn một chút (02:00-04:45 và 06:00-07:45) và
# chạy mỗi 15 phút; market_hours.py trong code sẽ tự lọc chính xác lại, nên
# không lo bị gửi sai giờ - chỉ tốn thêm vài lần "chạy không làm gì" ngoài lề.
on:
  schedule:
    - cron: '*/15 2-4,6-7 * * 1-5'
  workflow_dispatch: {}

# Cần quyền ghi để bot tự commit lại file trạng thái chống gửi cảnh báo trùng
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cài đặt thư viện
        run: pip install -r requirements.txt

      - name: Quét breakout & gửi cảnh báo nếu có
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python realtime_alert.py

      - name: Lưu lại trạng thái đã cảnh báo (commit về repo)
        run: |
          git config user.name "vn-stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/breakout_state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: cap nhat trang thai breakout [skip ci]"
            git push
          else
            echo "Không có thay đổi trạng thái, bỏ qua commit."
          fi
